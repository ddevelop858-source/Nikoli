<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROM - Chat & Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow-x: hidden;
        }

        /* Граффити заголовок */
        header {
            text-align: center;
            padding: 20px;
        }

        .graffiti-title {
            font-family: 'Permanent Marker', cursive;
            font-size: 80px;
            color: var(--neon-blue);
            text-shadow: 5px 5px 0px var(--neon-pink), 10px 10px 20px #000;
            margin: 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Бегущая строка */
        .marquee {
            background: rgba(255, 0, 127, 0.7);
            color: white;
            padding: 10px 0;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Радио и Визуализатор */
        .radio-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        #logo-radio {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            cursor: pointer;
            transition: transform 0.3s;
            background: url('https://europaplus.ru/favicon.ico') center/cover;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .rotating {
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Чат */
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            background: rgba(0,0,0,0.4);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            position: relative;
            animation: fadeIn 0.3s;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            color: var(--neon-pink);
            font-size: 12px;
        }

        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
        }

        button {
            background: var(--neon-blue);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="radio-container">
        <div id="logo-radio" onclick="toggleRadio()"></div>
        <audio id="radio-player" crossorigin="anonymous">
            <source src="https://ep256.hostingradio.ru:8052/europaplus256.mp3" type="audio/mpeg">
        </audio>
    </div>

    <canvas id="visualizer"></canvas>

    <header>
        <h1 class="graffiti-title">GROM</h1>
    </header>

    <div class="marquee">
        <span>Добро пожаловать в наш чат. Приятного общения и крутой музыки! • Добро пожаловать в наш чат...</span>
    </div>

    <div class="chat-container">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Напиши что-нибудь...">
            <button onclick="sendMessage()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ FIREBASE ---
        const firebaseConfig = {
            databaseURL: "ТВОЙ_URL_DATABASE_FIREBASE" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- ЛОГИКА РАДИО И ЦВЕТОМУЗЫКИ ---
        const audio = document.getElementById('radio-player');
        const logo = document.getElementById('logo-radio');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, source, dataArray;

        function initVisualizer() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            draw();
        }

        function toggleRadio() {
            if (!audioCtx) initVisualizer();
            if (audio.paused) {
                audio.play();
                logo.classList.add('rotating');
            } else {
                audio.pause();
                logo.classList.remove('rotating');
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            analyser.getByteFrequencyData(dataArray);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let barWidth = (canvas.width / dataArray.length) * 2;
            let barHeight;
            let x = 0;

            for(let i = 0; i < dataArray.length; i++) {
                barHeight = dataArray[i] * 1.5;
                ctx.fillStyle = i % 2 === 0 ? '#00f2ff' : '#ff007f';
                ctx.globalAlpha = 0.4;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        // --- ЛОГИКА ЧАТА ---
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                db.ref('messages').push({
                    text: input.value,
                    time: Date.now()
                });
                input.value = "";
            }
        }

        db.ref('messages').on('value', (snapshot) => {
            const msgDiv = document.getElementById('messages');
            msgDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                msgDiv.innerHTML += `
                    <div class="msg">
                        ${data.text}
                        <span class="delete-btn" onclick="deleteMsg('${child.key}')">УДАЛИТЬ</span>
                    </div>
                `;
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        function deleteMsg(key) {
            db.ref('messages/' + key).remove();
        }
    </script>
</body>
</html>
