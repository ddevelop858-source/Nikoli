<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikol Tenis</title>
    <style>
        :root { --accent: #ff4757; --bg: #2f3542; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* Спортивный дизайн */
        .racket-frame { border: 8px solid #ffa502; border-radius: 50px; padding: 20px; background: rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #ffa502; text-transform: uppercase; }
        
        section { margin-bottom: 30px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        /* Галерея */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
        .photo-placeholder { height: 100px; background: #57606f; border-radius: 8px; }

        /* Админка и чат */
        #admin-panel { display: none; border-top: 2px solid var(--accent); padding-top: 10px; }
        .chat-box { height: 150px; background: #1e272e; overflow-y: scroll; padding: 10px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="racket-frame">
    <h1>Nikol Tenis</h1>

    <section>
        <h3>Друзья</h3>
        <input type="text" id="friendName" placeholder="Имя друга">
        <button onclick="addFriend()">Добавить</button>
        <ul id="friendsList"></ul>
    </section>

    <section>
        <h3>Галерея</h3>
        <div class="gallery" id="gallery">
            <div class="photo-placeholder"></div>
            <div class="photo-placeholder"></div>
        </div>
    </section>

    <button onclick="toggleAdmin()">Вход для Админа</button>

    <div id="admin-panel">
        <h3>Админ-панель</h3>
        <div class="chat-box" id="chat">Чат: пока сообщений нет...</div>
        <input type="text" id="msg" placeholder="Ответить...">
        <button onclick="sendMsg()">Отправить</button>
    </div>
</div>

<script>
    function addFriend() {
        const name = document.getElementById('friendName').value;
        if(name) {
            const li = document.createElement('li');
            li.textContent = name;
            document.getElementById('friendsList').appendChild(li);
        }
    }

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function sendMsg() {
        const msg = document.getElementById('msg').value;
        const chat = document.getElementById('chat');
        chat.innerHTML += `<br>Админ: ${msg}`;
    }
</script>
</body>
</html>
